# Risk management configuration

# Position limits
max_risk_per_trade_pct: 5.0
max_market_exposure_pct: 15.0
max_category_exposure_pct: 25.0
max_correlated_exposure_pct: 20.0

# Drawdown
max_daily_drawdown_pct: 10.0

# Portfolio
max_open_positions: 30
starting_equity_usd: 10000.0

# Rate limiting
max_orders_per_minute: 30

# Kill switches
stale_feed_timeout_sec: 120
max_spread_ceiling: 0.30
rapid_adverse_move_pct: 10.0
max_order_reject_rate_pct: 95.0

# Panic flatten
panic_flatten_enabled: true

# Market close proximity
no_entry_before_close_minutes: 15
