# Risk management configuration

# Position limits
max_risk_per_trade_pct: 1.0
max_market_exposure_pct: 5.0
max_category_exposure_pct: 10.0
max_correlated_exposure_pct: 8.0

# Drawdown
max_daily_drawdown_pct: 3.0

# Portfolio
max_open_positions: 20
starting_equity_usd: 1000.0

# Rate limiting
max_orders_per_minute: 10

# Kill switches
stale_feed_timeout_sec: 60
max_spread_ceiling: 0.25
rapid_adverse_move_pct: 5.0
max_order_reject_rate_pct: 50.0

# Panic flatten
panic_flatten_enabled: true

# Market close proximity
no_entry_before_close_minutes: 30
