# Strategy configuration

enabled_strategies:
  - stale_odds

# Global thresholds
entry_edge_threshold: 0.015
exit_edge_threshold: 0.005
slippage_buffer: 0.002
uncertainty_buffer: 0.003
hold_time_limit_minutes: 30

# Stale odds specific
stale_odds:
  complement_deviation_threshold: 0.008
  staleness_seconds: 60
  min_confidence: 0.25
  max_spread_for_entry: 0.20

# Cross-market consistency (disabled by default)
cross_market:
  enabled: false
  sum_deviation_threshold: 0.05

# Position sizing
default_order_size_usd: 25.0
max_order_size_usd: 100.0
